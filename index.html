<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的待办清单</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">
          <span class="title-icon" aria-hidden="true">📋</span>
          我的待办清单
        </h1>
        <p class="subtitle">记录今天要做的事</p>
      </header>

      <section class="input-section" aria-label="添加任务">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="今天要做什么？"
          maxlength="200"
          autocomplete="off"
        />
        <div class="input-meta">
          <div id="prioritySelectHost" class="flat-select-host"></div>
          <div class="duration-field">
            <div id="durationSelectHost" class="flat-select-host"></div>
            <label class="duration-manual">
              <span class="duration-manual-label">或输入</span>
              <input
                type="number"
                id="durationInput"
                class="duration-input"
                min="10"
                max="120"
                step="1"
                value="30"
                aria-label="计划用时（分钟）"
              />
              <span class="duration-unit">分钟</span>
            </label>
          </div>
        </div>
        <button type="button" id="addBtn" class="btn btn-primary">➕ 添加任务</button>
      </section>

      <section class="stats" aria-live="polite">
        <span class="stat stat-pending">
          未完成 <strong id="pendingCount">0</strong>
        </span>
        <span class="stat-divider" aria-hidden="true"></span>
        <span class="stat stat-done">
          已完成 <strong id="completedCount">0</strong>
        </span>
      </section>

      <div class="actions-bar">
        <button type="button" id="todayReportBtn" class="btn btn-accent">
          📊 今日成果
        </button>
        <button type="button" id="clearCompletedBtn" class="btn btn-secondary" disabled>
          清空已完成
        </button>
        <button type="button" id="clearAllBtn" class="btn btn-danger" disabled>
          全部清空
        </button>
      </div>

      <div id="reportModal" class="modal" hidden aria-hidden="true">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-panel" role="dialog" aria-labelledby="reportTitle">
          <h2 id="reportTitle" class="modal-title">今日成果</h2>
          <div id="reportContent" class="report-content"></div>
          <button type="button" id="closeReportBtn" class="btn btn-primary modal-close-btn">
            知道了
          </button>
        </div>
      </div>

      <ul id="taskList" class="task-list" aria-label="任务列表"></ul>

      <div id="emptyState" class="empty-state" hidden>
        <span class="empty-icon" aria-hidden="true">🌟</span>
        <p class="empty-title">还没有任务哦</p>
        <p class="empty-desc">在上方写下「今天要做什么？」<br />开启高效又轻松的一天吧～</p>
      </div>
    </div>

    <script src="flat-select.js"></script>
    <script src="app.js"></script>
  </body>
</html>
