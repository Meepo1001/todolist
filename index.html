<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#25105;&#30340;&#24453;&#21150;&#28165;&#21333;</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-panel" aria-labelledby="app-title">
        <header class="app-header">
          <div>
            <h1 id="app-title"><span aria-hidden="true">&#128221;</span> &#25105;&#30340;&#24453;&#21150;&#28165;&#21333;</h1>
            <p>&#25226;&#20170;&#22825;&#25286;&#25104;&#19968;&#20214;&#20214;&#36731;&#26494;&#23436;&#25104;&#30340;&#23567;&#20107;&#12290;</p>
          </div>
          <div class="header-actions">
            <button class="ghost-button" id="summaryButton" type="button">&#20170;&#26085;&#25104;&#26524;</button>
            <button class="ghost-button" id="calendarButton" type="button">&#24037;&#20316;&#26085;&#21382;</button>
            <button class="ghost-button" id="meetingButton" type="button">&#25289;&#20250;</button>
            <button class="icon-button" id="calendarSettingsButton" type="button" aria-label="&#24037;&#20316;&#26085;&#21382;&#35774;&#32622;">&#9881;</button>
          </div>
        </header>

        <form class="task-form" id="taskForm">
          <label class="sr-only" for="taskInput">&#20219;&#21153;&#20869;&#23481;</label>
          <input id="taskInput" type="text" placeholder="&#20170;&#22825;&#35201;&#20570;&#20160;&#20040;&#65311;" autocomplete="off" required>

          <div class="controls-row">
            <label class="select-wrap priority-select">
              <span>&#37325;&#35201;&#24230;</span>
              <select id="prioritySelect" aria-label="&#36873;&#25321;&#37325;&#35201;&#31243;&#24230;">
                <option value="high">&#39640;</option>
                <option value="medium" selected>&#20013;</option>
                <option value="low">&#20302;</option>
              </select>
            </label>

            <label class="select-wrap time-select">
              <span>&#35745;&#21010;&#29992;&#26102;</span>
              <input id="timeInput" type="number" min="10" max="120" step="10" value="30" aria-label="&#35745;&#21010;&#29992;&#26102;&#65292;&#20998;&#38047;">
            </label>

            <label class="select-wrap date-select">
              <span>&#20219;&#21153;&#26085;&#26399;</span>
              <input id="taskDateInput" type="date" aria-label="&#20219;&#21153;&#26085;&#26399;">
            </label>

            <label class="select-wrap start-select">
              <span>&#36215;&#22987;&#26102;&#38388;</span>
              <input id="dayStartInput" type="time" value="09:00" aria-label="&#20170;&#26085;&#36215;&#22987;&#26102;&#38388;">
            </label>

            <button class="primary-button" type="submit"><span class="button-plus">+</span> &#28155;&#21152;&#20219;&#21153;</button>
          </div>
        </form>

        <div class="stats-bar" aria-live="polite">
          <span>&#26410;&#23436;&#25104; <strong id="pendingCount">0</strong></span>
          <span>&#24050;&#23436;&#25104; <strong id="completedCount">0</strong></span>
        </div>

        <div class="actions-row">
          <button class="soft-button" id="clearCompletedButton" type="button">&#28165;&#31354;&#24050;&#23436;&#25104;</button>
          <button class="soft-button" id="deferButton" type="button">&#19968;&#38190;&#39034;&#24310;</button>
          <button class="soft-button" id="exportButton" type="button">&#29983;&#25104;Excel&#34920;&#26684;</button>
          <button class="danger-button" id="clearAllButton" type="button">&#20840;&#37096;&#28165;&#31354;</button>
        </div>

        <ul class="task-list" id="taskList" aria-label="&#24453;&#21150;&#20219;&#21153;&#21015;&#34920;"></ul>

        <p class="empty-state" id="emptyState">&#29616;&#22312;&#36824;&#27809;&#26377;&#20219;&#21153;&#65292;&#32473;&#20170;&#22825;&#23433;&#25490;&#19968;&#20010;&#28201;&#26580;&#30340;&#23567;&#30446;&#26631;&#21543;&#12290;</p>
      </section>
    </main>

    <dialog class="summary-dialog" id="summaryDialog">
      <div class="summary-card">
        <header>
          <h2>&#20170;&#26085;&#25104;&#26524;</h2>
          <button class="icon-button" id="closeSummaryButton" type="button" aria-label="&#20851;&#38381;">&times;</button>
        </header>
        <div class="summary-grid" id="summaryContent"></div>
      </div>
    </dialog>

    <dialog class="calendar-dialog" id="calendarDialog">
      <div class="calendar-card">
        <header>
          <div>
            <h2>&#24037;&#20316;&#26085;&#21382;</h2>
            <p id="calendarStatus">&#35831;&#20808;&#36890;&#36807;&#40831;&#36718;&#35774;&#32622;&#25968;&#25454;&#25991;&#20214;&#22841;&#12290;</p>
          </div>
          <button class="icon-button" id="closeCalendarButton" type="button" aria-label="&#20851;&#38381;">&times;</button>
        </header>

        <div class="calendar-stats" id="calendarStats"></div>
        <div class="calendar-scroller" id="calendarScroller"></div>
        <section class="day-detail" id="dayDetail"></section>
      </div>
    </dialog>

    <dialog class="settings-dialog" id="settingsDialog">
      <div class="settings-card">
        <header>
          <div>
            <h2>&#25968;&#25454;&#26469;&#28304;&#35774;&#32622;</h2>
            <p id="folderStatus">&#36824;&#27809;&#26377;&#35774;&#32622;&#40664;&#35748;&#25968;&#25454;&#25991;&#20214;&#22841;&#12290;</p>
          </div>
          <button class="icon-button" id="closeSettingsButton" type="button" aria-label="&#20851;&#38381;">&times;</button>
        </header>
        <div class="settings-actions">
          <button class="primary-button" id="chooseFolderButton" type="button">&#36873;&#25321;&#25991;&#20214;&#22841;</button>
          <button class="soft-button" id="refreshCalendarButton" type="button">&#31435;&#21363;&#26356;&#26032;</button>
          <button class="danger-button" id="clearFolderButton" type="button">&#28165;&#38500;&#36335;&#24452;</button>
        </div>
        <p class="settings-note">&#27983;&#35272;&#22120;&#38656;&#35201;&#20320;&#25480;&#26435;&#25165;&#33021;&#35835;&#21462;&#26412;&#22320;&#25991;&#20214;&#22841;&#12290;&#22914;&#26524;&#26435;&#38480;&#22833;&#25928;&#65292;&#37325;&#26032;&#36873;&#25321;&#19968;&#27425;&#21363;&#21487;&#12290;</p>
      </div>
    </dialog>

    <dialog class="meeting-dialog" id="meetingDialog">
      <div class="meeting-card">
        <header>
          <div>
            <h2>&#25289;&#20250;</h2>
            <p id="meetingStatus">&#20174;&#24037;&#20316;&#26085;&#21382;&#25968;&#25454;&#20013;&#29983;&#25104;&#26412;&#21608;&#21344;&#29992;&#35270;&#22270;&#12290;</p>
          </div>
          <button class="icon-button" id="closeMeetingButton" type="button" aria-label="&#20851;&#38381;">&times;</button>
        </header>

        <div class="meeting-toolbar">
          <button class="soft-button" id="prevWeekButton" type="button">&#19978;&#19968;&#21608;</button>
          <strong id="meetingWeekLabel"></strong>
          <button class="soft-button" id="nextWeekButton" type="button">&#19979;&#19968;&#21608;</button>
        </div>

        <div class="meeting-grid-wrap" id="meetingGridWrap">
          <div class="meeting-grid" id="meetingGrid"></div>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
